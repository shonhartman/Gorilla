    enabled: true
    handle: "@gorilla"
    hashtags:
      - "#BuildWithPurpose"
      - "#GorillaMarketing"
  facebook:
    enabled: true
    page_id: ""
  tiktok:
    enabled: false
    handle: ""
  linkedin:
    enabled: false
    company_id: ""

content:
  jab_ratio: 3
  post_cadence_per_week: 5
  formats:
    - carousel
    - short_video
    - story
    - text_post

meta_ads:
  ad_account_id: ""
  pixel_id: ""
  default_objective: "OUTCOME_ENGAGEMENT"
